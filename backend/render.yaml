services:
  - type: web
    name: katana-sushi-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build && npm run prisma:generate && npx prisma db push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        value: change-me-in-render
