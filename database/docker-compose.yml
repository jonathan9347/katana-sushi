# database\docker-compose.yml
services:
  postgres:
    image: postgres:15
    container_name: katana_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: katana
      POSTGRES_PASSWORD: katana123
      POSTGRES_DB: katana_db
    volumes:
      - katana_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: katana_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: katana_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  katana_postgres_data: